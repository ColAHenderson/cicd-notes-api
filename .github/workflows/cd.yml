name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/colahenderson/cicd-notes-api

jobs:
  build-and-publish:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .

      - name: Push image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

      - name: Store image output
        id: image
        run: echo "image=$IMAGE_NAME:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-and-publish
    environment: staging

    steps:
      - name: Trigger staging deploy
        run: curl -X POST "${{ secrets.STAGING_DEPLOY_HOOK }}"

      - name: Wait for deploy
        run: sleep 60

      - name: Smoke test staging
        run: curl -f "${{ vars.STAGING_URL }}/health"

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Trigger production deploy
        run: curl -X POST "${{ secrets.PRODUCTION_DEPLOY_HOOK }}"

      - name: Wait for deploy
        run: sleep 60

      - name: Smoke test production
        run: curl -f "${{ vars.PRODUCTION_URL }}/health"